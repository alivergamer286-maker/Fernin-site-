<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Ferlin Estética e Saúde</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --ink:#15170f; --ink-2:#1e2117;
    --parchment:#f5efe2; --parchment-2:#ece3d0;
    --ink-text:#23261a;
    --gold:#c6974f; --gold-bright:#e9b86b;
    --sage-dim:#5f6b4c;
    --line-dark:rgba(35,38,26,0.12);
    --ok:#4c6b3f; --warn:#9c4a2f; --pending:#a3812f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--parchment);color:var(--ink-text);
    font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:400;margin:0;}

  /* ---- config warning ---- */
  .config-warning{
    display:none;background:#3a2a1a;color:#f0c98a;padding:14px 20px;
    font-size:.85rem;text-align:center;
  }
  .config-warning.show{display:block;}

  /* ---- login ---- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--ink);padding:20px;
  }
  .login-card{
    width:100%;max-width:360px;background:var(--parchment);
    border-radius:10px;padding:2.4rem 2rem;box-shadow:0 30px 70px -20px rgba(0,0,0,.6);
  }
  .login-card h1{font-size:1.6rem;margin-bottom:.3rem;}
  .login-card p.sub{color:#6b6e5a;font-size:.86rem;margin:0 0 1.6rem;}
  .field{margin-bottom:1.1rem;}
  .field label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:#6b6e5a;margin-bottom:.4rem;}
  .field input{
    width:100%;padding:.8em .9em;border-radius:6px;border:1px solid var(--line-dark);
    background:#fff;font-family:'Manrope',sans-serif;font-size:.94rem;color:var(--ink-text);
  }
  .field input:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:.5em;
    font-family:'Manrope',sans-serif;font-size:.85rem;font-weight:600;
    padding:.85em 1.4em;border-radius:8px;border:1px solid var(--gold);
    cursor:pointer;background:var(--gold);color:var(--ink);width:100%;
    transition:background .3s ease, transform .3s ease;
  }
  .btn:hover{background:var(--gold-bright);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--ink-text);border-color:var(--sage-dim);width:auto;}
  .login-error{color:var(--warn);font-size:.82rem;margin-top:1rem;display:none;}
  .login-error.show{display:block;}

  /* ---- dashboard ---- */
  #dashboard{display:none;}
  #dashboard.show{display:block;}
  header{
    background:var(--ink);color:var(--parchment);
    padding:20px clamp(16px,4vw,40px);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  header .brand{font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;}
  header .brand small{display:block;font-family:'Manrope',sans-serif;font-style:normal;font-size:.65rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-top:2px;}
  .header-actions{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;}

  main{padding:28px clamp(16px,4vw,40px) 60px;max-width:1200px;margin:0 auto;}
  .toolbar{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
  .toolbar select, .toolbar input{
    padding:.6em .8em;border-radius:6px;border:1px solid var(--line-dark);
    background:#fff;font-family:'Manrope',sans-serif;font-size:.85rem;color:var(--ink-text);
  }
  .stat-pills{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:20px;}
  .stat-pill{
    background:#fff;border:1px solid var(--line-dark);border-radius:999px;
    padding:.5em 1em;font-size:.8rem;color:#4a4d3c;
  }
  .stat-pill strong{color:var(--ink-text);font-family:'Fraunces',serif;margin-right:.3em;}

  .bookings-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 0 var(--line-dark);}
  .bookings-table th, .bookings-table td{
    text-align:left;padding:.9em 1em;font-size:.86rem;border-bottom:1px solid var(--line-dark);
  }
  .bookings-table th{
    background:var(--parchment-2);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#6b6e5a;
  }
  .bookings-table tr:last-child td{border-bottom:none;}
  .bookings-table tr.today{background:rgba(198,151,79,.08);}
  .status-badge{
    display:inline-block;padding:.25em .7em;border-radius:999px;font-size:.72rem;font-weight:600;
    color:#fff;
  }
  .status-badge.pendente{background:var(--pending);}
  .status-badge.confirmado{background:var(--ok);}
  .status-badge.cancelado{background:#8a8d76;}
  .row-actions{display:flex;gap:.4rem;flex-wrap:wrap;}
  .row-actions button{
    font-size:.72rem;padding:.4em .7em;border-radius:5px;border:1px solid var(--line-dark);
    background:#fff;cursor:pointer;color:var(--ink-text);
  }
  .row-actions button.confirm{border-color:var(--ok);color:var(--ok);}
  .row-actions button.cancel{border-color:var(--warn);color:var(--warn);}
  .empty-state{text-align:center;padding:60px 20px;color:#8a8d76;font-size:.92rem;}
  .loading-state{text-align:center;padding:40px;color:#8a8d76;font-size:.9rem;}

  @media (max-width:760px){
    .bookings-table{display:block;overflow-x:auto;white-space:nowrap;}
  }
</style>
</head>
<body>

<script>
  /* Cole aqui os MESMOS valores usados no index.html */
  window.FERLIN_CONFIG = {
    SUPABASE_URL: "COLE_AQUI_A_SUPABASE_URL",
    SUPABASE_ANON_KEY: "COLE_AQUI_A_ANON_KEY"
  };
</script>

<div class="config-warning" id="configWarning">
  Este painel ainda não foi configurado — edite <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no topo do arquivo admin.html (veja o README.md).
</div>

<div id="loginScreen">
  <div class="login-card">
    <h1>Painel Ferlin</h1>
    <p class="sub">Entre com o acesso da equipe para ver os agendamentos.</p>
    <div class="field">
      <label for="loginEmail">E-mail</label>
      <input type="email" id="loginEmail" autocomplete="username">
    </div>
    <div class="field">
      <label for="loginPassword">Senha</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
    </div>
    <button type="button" class="btn" id="loginBtn">Entrar</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="brand">Ferlin<small>Painel de agendamentos</small></div>
    <div class="header-actions">
      <button type="button" class="btn btn-ghost" id="refreshBtn">Atualizar</button>
      <button type="button" class="btn btn-ghost" id="logoutBtn">Sair</button>
    </div>
  </header>
  <main>
    <div class="stat-pills" id="statPills"></div>
    <div class="toolbar">
      <select id="statusFilter">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="confirmado">Confirmado</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <input type="date" id="dateFilter">
      <button type="button" class="btn btn-ghost" id="clearFilters">Limpar filtros</button>
    </div>
    <div id="tableWrap">
      <div class="loading-state">Carregando agendamentos...</div>
    </div>
  </main>
</div>

<script>
(function(){
  var cfg = window.FERLIN_CONFIG || {};
  var configured = cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && cfg.SUPABASE_URL.indexOf('COLE_AQUI') === -1;

  if(!configured){
    document.getElementById('configWarning').classList.add('show');
  }

  var sb = (configured && window.supabase) ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY) : null;

  var loginScreen = document.getElementById('loginScreen');
  var dashboard = document.getElementById('dashboard');
  var loginBtn = document.getElementById('loginBtn');
  var loginError = document.getElementById('loginError');
  var allBookings = [];

  function showError(msg){
    loginError.textContent = msg;
    loginError.classList.add('show');
  }

  function showDashboard(){
    loginScreen.style.display = 'none';
    dashboard.classList.add('show');
    loadBookings();
  }

  loginBtn.addEventListener('click', function(){
    if(!sb){ showError('Configure o Supabase antes de fazer login (veja o aviso no topo da página).'); return; }
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    if(!email || !password){ showError('Preencha e-mail e senha.'); return; }
    loginBtn.disabled = true; loginBtn.textContent = 'Entrando...';
    loginError.classList.remove('show');
    sb.auth.signInWithPassword({ email: email, password: password }).then(function(res){
      loginBtn.disabled = false; loginBtn.textContent = 'Entrar';
      if(res.error){
        showError('E-mail ou senha inválidos.');
        return;
      }
      showDashboard();
    }).catch(function(){
      loginBtn.disabled = false; loginBtn.textContent = 'Entrar';
      showError('Erro de conexão. Tente novamente.');
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    if(sb){ sb.auth.signOut(); }
    dashboard.classList.remove('show');
    loginScreen.style.display = 'flex';
    document.getElementById('loginPassword').value = '';
  });

  document.getElementById('refreshBtn').addEventListener('click', loadBookings);
  document.getElementById('statusFilter').addEventListener('change', renderTable);
  document.getElementById('dateFilter').addEventListener('change', renderTable);
  document.getElementById('clearFilters').addEventListener('click', function(){
    document.getElementById('statusFilter').value = '';
    document.getElementById('dateFilter').value = '';
    renderTable();
  });

  function loadBookings(){
    if(!sb) return;
    document.getElementById('tableWrap').innerHTML = '<div class="loading-state">Carregando agendamentos...</div>';
    sb.from('bookings').select('*').order('booking_date', { ascending:true }).order('time_slot', { ascending:true })
      .then(function(res){
        if(res.error){
          document.getElementById('tableWrap').innerHTML = '<div class="empty-state">Não foi possível carregar os agendamentos. Verifique se você está logada(o) com um usuário autorizado.</div>';
          return;
        }
        allBookings = res.data || [];
        renderStats();
        renderTable();
      });
  }

  function renderStats(){
    var today = new Date().toISOString().slice(0,10);
    var pend = allBookings.filter(function(b){ return b.status === 'pendente'; }).length;
    var conf = allBookings.filter(function(b){ return b.status === 'confirmado'; }).length;
    var hoje = allBookings.filter(function(b){ return b.booking_date === today && b.status !== 'cancelado'; }).length;
    document.getElementById('statPills').innerHTML =
      '<span class="stat-pill"><strong>'+hoje+'</strong>hoje</span>' +
      '<span class="stat-pill"><strong>'+pend+'</strong>pendentes</span>' +
      '<span class="stat-pill"><strong>'+conf+'</strong>confirmados</span>' +
      '<span class="stat-pill"><strong>'+allBookings.length+'</strong>no total</span>';
  }

  function renderTable(){
    var statusF = document.getElementById('statusFilter').value;
    var dateF = document.getElementById('dateFilter').value;
    var rows = allBookings.filter(function(b){
      if(statusF && b.status !== statusF) return false;
      if(dateF && b.booking_date !== dateF) return false;
      return true;
    });
    var wrap = document.getElementById('tableWrap');
    if(!rows.length){
      wrap.innerHTML = '<div class="empty-state">Nenhum agendamento encontrado.</div>';
      return;
    }
    var today = new Date().toISOString().slice(0,10);
    var html = '<table class="bookings-table"><thead><tr>' +
      '<th>Data</th><th>Hora</th><th>Serviço</th><th>Cliente</th><th>Telefone</th><th>Obs.</th><th>Status</th><th>Ações</th>' +
      '</tr></thead><tbody>';
    rows.forEach(function(b){
      var dateFmt = new Date(b.booking_date + 'T00:00:00').toLocaleDateString('pt-BR');
      html += '<tr class="' + (b.booking_date === today ? 'today' : '') + '">' +
        '<td>' + dateFmt + '</td>' +
        '<td>' + b.time_slot + '</td>' +
        '<td>' + escapeHtml(b.service) + '</td>' +
        '<td>' + escapeHtml(b.client_name) + '</td>' +
        '<td>' + escapeHtml(b.client_phone) + '</td>' +
        '<td>' + escapeHtml(b.notes || '—') + '</td>' +
        '<td><span class="status-badge ' + b.status + '">' + b.status + '</span></td>' +
        '<td><div class="row-actions">' +
          (b.status !== 'confirmado' ? '<button class="confirm" data-id="'+b.id+'" data-action="confirmado">Confirmar</button>' : '') +
          (b.status !== 'cancelado' ? '<button class="cancel" data-id="'+b.id+'" data-action="cancelado">Cancelar</button>' : '') +
        '</div></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;

    wrap.querySelectorAll('button[data-action]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-id');
        var action = btn.getAttribute('data-action');
        btn.disabled = true;
        sb.from('bookings').update({ status: action }).eq('id', id).then(function(res){
          if(!res.error){
            var b = allBookings.find(function(x){ return x.id === id; });
            if(b){ b.status = action; }
            renderStats();
            renderTable();
          } else {
            btn.disabled = false;
          }
        });
      });
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  /* keep session across reloads */
  if(sb){
    sb.auth.getSession().then(function(res){
      if(res.data && res.data.session){ showDashboard(); }
    });
  }
})();
</script>
</body>
</html>
